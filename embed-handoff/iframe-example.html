<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ShapeCraft 임베드 — 부모(TW) 데모</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 system-ui,sans-serif; background:#0a0620; color:#eee;
         display:grid; grid-template-columns:1fr 360px; grid-template-rows:auto 1fr; height:100vh; }
  header { grid-column:1/3; padding:10px 16px; background:#140a30; border-bottom:1px solid #2a1c55;
           display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0 12px 0 0; }
  header input { flex:1; min-width:240px; padding:6px 10px; border-radius:8px; border:1px solid #3a2a6a;
                 background:#0d0826; color:#eee; }
  button { padding:6px 10px; border-radius:8px; border:1px solid #5a3aa6; background:#2a1c55; color:#eee; cursor:pointer; }
  button:hover { background:#3a2670; }
  .stage { position:relative; background:#000; }
  iframe { width:100%; height:100%; border:0; display:block; }
  aside { background:#0d0826; border-left:1px solid #2a1c55; display:flex; flex-direction:column; }
  .cmds { padding:10px; display:flex; flex-wrap:wrap; gap:6px; border-bottom:1px solid #2a1c55; }
  #log { flex:1; margin:0; padding:10px; overflow:auto; font:12px/1.45 ui-monospace,monospace; white-space:pre-wrap; }
  .in { color:#7effb0; } .out { color:#8fbcff; } .warn { color:#ffb38f; }
</style>
</head>
<body>
<header>
  <h1>ShapeCraft 임베드 데모 (부모/TW)</h1>
  <input id="src" value="https://byeol-coder.github.io/dot_maze/?embed=1&preview=0">
  <button id="load">로드</button>
</header>

<div class="stage"><iframe id="game" title="ShapeCraft" allow="bluetooth; microphone; autoplay; clipboard-write"></iframe></div>

<aside>
  <div class="cmds">
    <button data-cmd="SHAPECRAFT_START">START</button>
    <button data-cmd="SHAPECRAFT_PAUSE">PAUSE</button>
    <button data-cmd="SHAPECRAFT_RESUME">RESUME</button>
    <button data-cmd="SHAPECRAFT_FOCUS">FOCUS</button>
    <button data-cmd="SHAPECRAFT_MUTE" data-arg='{"muted":true}'>MUTE</button>
    <button data-cmd="SHAPECRAFT_MUTE" data-arg='{"muted":false}'>UNMUTE</button>
    <button data-cmd="SHAPECRAFT_SET_LANG" data-arg='{"lang":"en"}'>EN</button>
    <button data-cmd="SHAPECRAFT_SET_LANG" data-arg='{"lang":"ko"}'>KO</button>
    <button data-cmd="SHAPECRAFT_SET_PREVIEW" data-arg='{"visible":true}'>PREVIEW ON</button>
    <button data-cmd="SHAPECRAFT_SET_PREVIEW" data-arg='{"visible":false}'>PREVIEW OFF</button>
  </div>
  <pre id="log"></pre>
</aside>

<script>
  var iframe = document.getElementById('game');
  var srcInput = document.getElementById('src');
  var logEl = document.getElementById('log');

  function childOrigin() { try { return new URL(srcInput.value).origin; } catch (e) { return '*'; } }
  function log(cls, msg) {
    var t = new Date().toISOString().slice(11, 19);
    logEl.innerHTML += '<span class="' + cls + '">[' + t + '] ' + msg + '</span>\n';
    logEl.scrollTop = logEl.scrollHeight;
  }

  function load() { iframe.src = srcInput.value; log('warn', 'load → ' + srcInput.value); }
  document.getElementById('load').addEventListener('click', load);

  // 부모 → 자식 명령
  document.querySelectorAll('[data-cmd]').forEach(function (b) {
    b.addEventListener('click', function () {
      var msg = Object.assign({ type: b.dataset.cmd }, b.dataset.arg ? JSON.parse(b.dataset.arg) : {});
      var origin = childOrigin();
      // 프로덕션: origin은 자식의 정확한 오리진으로. 로컬 file:// 데모는 '*' 폴백.
      try { iframe.contentWindow.postMessage(msg, origin === 'null' ? '*' : origin); } catch (e) {}
      log('out', '→ ' + JSON.stringify(msg) + '  (origin: ' + origin + ')');
    });
  });

  // 자식 → 부모 수신 (운영에서는 event.origin을 자식 오리진으로 검증)
  window.addEventListener('message', function (e) {
    var expected = childOrigin();
    if (expected !== '*' && expected !== 'null' && e.origin !== expected) {
      log('warn', '✗ untrusted origin: ' + e.origin); return;
    }
    log('in', '← ' + JSON.stringify(e.data));
  });

  load();
</script>
</body>
</html>
