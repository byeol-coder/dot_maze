name = "shapecraft-push"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Daily-reminder cron: every 5 minutes the Worker scans subscriptions and
# pushes to anyone whose local reminder time just passed (and who hasn't been
# notified yet today). Real background delivery — works even when the app/PWA
# is fully closed.
[triggers]
crons = ["*/5 * * * *"]

# KV namespace storing push subscriptions (one record per device).
# Create it once:  wrangler kv namespace create SUBS
# then paste the returned id below.
[[kv_namespaces]]
binding = "SUBS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# Public VAPID key (safe to commit — also embedded in the game client).
VAPID_PUBLIC = "BNyGs4ya7DHTO6xZtWA7P-UY9U58F2Wn30oYkxV8EZC-bLHzGA3TMxsrW-8rPEZZbs3DyXGAQ47xiev07bUEIhc"
VAPID_SUBJECT = "mailto:byeol@dotincorp.com"
# Allowed browser origins for /subscribe CORS (comma-separated). "*" = any.
ALLOW_ORIGIN = "*"

# VAPID_PRIVATE is a SECRET — never put it here. Set it once with:
#   wrangler secret put VAPID_PRIVATE
